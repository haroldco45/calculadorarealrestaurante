<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costeo Real para Restaurante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl overflow-hidden card-shadow">
        <div class="bg-slate-800 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">CALCULADORA REAL <span class="text-yellow-500">RESTAURANTE</span></h1>
                <p id="reloj" class="text-sm text-slate-400 font-mono"></p>
            </div>
            <div class="text-right border-l-2 border-yellow-500 pl-4">
                <p class="text-xs uppercase font-bold text-yellow-500">Control de Insumos</p>
                <p class="text-xl font-black">COLOMBIA</p>
            </div>
        </div>

        <div class="p-6 md:p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase">Nombre del Producto / Receta</label>
                    <input type="text" id="plato" placeholder="Ej. Hamburguesa Houston Pro" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase">Margen de Utilidad (%)</label>
                    <input type="number" id="margen" value="35" oninput="calcular()" class="w-full p-4 bg-yellow-50 border border-yellow-200 rounded-xl focus:outline-none font-bold text-xl text-center">
                </div>
            </div>

            <div class="overflow-x-auto mb-8">
                <table class="w-full border-collapse text-left">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-xs uppercase">
                            <th class="p-4 rounded-tl-xl font-black">Insumo</th>
                            <th class="p-4 font-black text-center">Peso Bruto (g/ml)</th>
                            <th class="p-4 font-black text-center text-red-600">Merma %</th>
                            <th class="p-4 font-black text-center">Costo Unit. (Kg/Lt)</th>
                            <th class="p-4 rounded-tr-xl font-black text-right">Costo Neto</th>
                        </tr>
                    </thead>
                    <tbody id="filas">
                        <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                            <td class="p-4"><input type="text" placeholder="Insumo 1" class="w-full bg-transparent outline-none font-medium"></td>
                            <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-24 p-2 bg-white border border-slate-200 rounded-lg text-center bruto"></td>
                            <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-20 p-2 bg-red-50 border border-red-100 rounded-lg text-center text-red-600 merma"></td>
                            <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-28 p-2 bg-white border border-slate-200 rounded-lg text-center costo-u"></td>
                            <td class="p-4 text-right font-bold text-slate-800 subtotal">$ 0</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button onclick="agregarFila()" class="mb-8 flex items-center gap-2 px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition">
                <span>+</span> Agregar Ingrediente
            </button>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-xs font-bold text-slate-500 uppercase mb-2">Costo Total Receta</p>
                    <h2 id="total-costo" class="text-2xl font-black text-slate-800">$ 0</h2>
                </div>
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-xs font-bold text-slate-500 uppercase mb-2">Utilidad Bruta</p>
                    <h2 id="total-utilidad" class="text-2xl font-black text-green-600">$ 0</h2>
                </div>
                <div class="p-6 bg-slate-800 rounded-2xl border border-slate-700 shadow-lg">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-2">PVP Sugerido (Con Margen)</p>
                    <h2 id="pvp" class="text-3xl font-black text-yellow-500">$ 0</h2>
                </div>
            </div>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-200 text-center">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                Créditos de Derechos de Autor © Vibras Positivas HM - 2026
            </p>
        </div>
    </div>

    <script>
        // Reloj Colombia
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', second: '2-digit', day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('reloj').innerText = now.toLocaleDateString('es-CO', options).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function agregarFila() {
            const tbody = document.getElementById('filas');
            const row = document.createElement('tr');
            row.className = "border-b border-slate-100 hover:bg-slate-50 transition";
            row.innerHTML = `
                <td class="p-4"><input type="text" placeholder="Nuevo Insumo" class="w-full bg-transparent outline-none font-medium"></td>
                <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-24 p-2 bg-white border border-slate-200 rounded-lg text-center bruto"></td>
                <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-20 p-2 bg-red-50 border border-red-100 rounded-lg text-center text-red-600 merma"></td>
                <td class="p-4 text-center"><input type="number" placeholder="0" oninput="calcular()" class="w-28 p-2 bg-white border border-slate-200 rounded-lg text-center costo-u"></td>
                <td class="p-4 text-right font-bold text-slate-800 subtotal">$ 0</td>
            `;
            tbody.appendChild(row);
        }

        function calcular() {
            const rows = document.querySelectorAll('#filas tr');
            let granTotalCosto = 0;

            rows.forEach(row => {
                const bruto = parseFloat(row.querySelector('.bruto').value) || 0;
                const mermaPct = parseFloat(row.querySelector('.merma').value) || 0;
                const costoUnidad = parseFloat(row.querySelector('.costo-u').value) || 0;

                // Lógica Siigo: Costo Real = Costo x Kg ajustado por rendimiento de merma
                // Peso Neto = Bruto * (1 - Merma%)
                // Sin embargo, el restaurante paga por el Bruto. El costo del ingrediente en el plato es (Bruto/1000) * CostoKg
                const subtotal = (bruto / 1000) * costoUnidad;
                
                row.querySelector('.subtotal').innerText = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(subtotal);
                granTotalCosto += subtotal;
            });

            const margenPct = parseFloat(document.getElementById('margen').value) || 0;
            const factorMargen = 1 - (margenPct / 100);
            
            // Precio Venta Público Sugerido
            const pvp = factorMargen > 0 ? (granTotalCosto / factorMargen) : 0;
            const utilidad = pvp - granTotalCosto;

            const format = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(val);

            document.getElementById('total-costo').innerText = format(granTotalCosto);
            document.getElementById('total-utilidad').innerText = format(utilidad);
            document.getElementById('pvp').innerText = format(pvp);
        }
    </script>
</body>
</html>
